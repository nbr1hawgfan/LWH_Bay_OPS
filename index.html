<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>LWH Bay Ops</title>
  <style>
    :root {
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-500: #64748b;
      --slate-300: #cbd5e1;
      --slate-100: #f1f5f9;
      --slate-50:  #f8fafc;
      --emerald-600: #059669;
      --emerald-500: #10b981;
      --emerald-100: #d1fae5;
      --amber-500: #f59e0b;
      --amber-100: #fef3c7;
      --red-500: #ef4444;
      --red-100: #fee2e2;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--slate-50);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--slate-900);
    }
    .mono {
      font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, monospace;
    }
    header {
      background: var(--slate-900);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    header button.ghost {
      background: transparent;
      border: 1px solid var(--slate-700);
      color: var(--slate-300);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
    }
    main { padding: 16px; max-width: 560px; margin: 0 auto; padding-bottom: 60px; }
    .card {
      background: white;
      border: 1px solid var(--slate-300);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--slate-700);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    select, input[type=text] {
      width: 100%;
      font-size: 18px;
      padding: 14px 12px;
      border: 1px solid var(--slate-300);
      border-radius: 10px;
      background: var(--slate-50);
      color: var(--slate-900);
      margin-bottom: 14px;
    }
    input[type=text]:focus, select:focus {
      outline: none;
      border-color: var(--emerald-500);
      background: white;
    }
    button.big {
      width: 100%;
      font-size: 18px;
      font-weight: 700;
      padding: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button.primary { background: var(--emerald-500); color: white; }
    button.primary:active { background: var(--emerald-600); }
    button.secondary { background: var(--slate-100); color: var(--slate-800); border: 1px solid var(--slate-300); }
    button.secondary:active { background: var(--slate-300); }
    button.scan {
      background: var(--slate-800);
      color: white;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .status-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .status-ready { background: var(--emerald-500); }
    .status-unknown { background: var(--amber-500); }
    .status-text { font-weight: 700; font-size: 16px; }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }
    .field { background: var(--slate-50); border-radius: 8px; padding: 10px 12px; }
    .field .k { font-size: 11px; text-transform: uppercase; color: var(--slate-500); font-weight: 700; letter-spacing: 0.3px; }
    .field .v { font-size: 16px; font-weight: 700; margin-top: 2px; }
    .customer-banner {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin: 16px 0 4px;
      color: var(--slate-900);
    }

    .suggestion-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--emerald-100);
      color: var(--emerald-600);
      border: 1px solid var(--emerald-500);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 15px;
      margin: 4px 6px 4px 0;
      cursor: pointer;
    }
    .chip-count { font-size: 12px; opacity: 0.7; font-weight: 600; }

    .group-list, .bay-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .group-btn, .bay-btn {
      background: var(--slate-100);
      border: 1px solid var(--slate-300);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: var(--slate-800);
    }
    .group-btn:active, .bay-btn:active { background: var(--slate-300); }
    .bay-btn { font-family: "IBM Plex Mono", ui-monospace, monospace; }

    .breadcrumb { font-size: 13px; color: var(--slate-500); margin-bottom: 10px; }
    .breadcrumb button { background: none; border: none; color: var(--emerald-600); font-weight: 700; padding: 0; font-size: 13px; cursor: pointer; }

    .banner {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .banner.warn { background: var(--amber-100); color: #92400e; }
    .banner.error { background: var(--red-100); color: #991b1b; }

    .hidden { display: none !important; }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid var(--slate-300);
      border-top-color: var(--emerald-500);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sync-note { text-align: center; font-size: 12px; color: var(--slate-500); margin-top: -4px; margin-bottom: 14px; }
  </style>
</head>
<body>

<header>
  <h1>LWH Bay Ops</h1>
  <button class="ghost" onclick="goHome()">Main Menu</button>
</header>

<main>

  <!-- SEARCH SCREEN -->
  <div id="screen-search">
    <div class="card">
      <label for="palletType">Pallet ID Type</label>
      <select id="palletType">
        <option value="LWH ID">LWH ID</option>
        <option value="Customer ID">Customer ID</option>
      </select>

      <label for="palletId">Pallet ID</label>
      <input type="text" id="palletId" inputmode="text" autocomplete="off" placeholder="Scan or type ID">

      <button class="big scan" id="btnScan" onclick="startScan()">📷 Scan Barcode</button>
      <button class="big primary" onclick="doLookup()">Pick Up</button>
    </div>
    <div id="search-error"></div>
  </div>

  <!-- LOADING -->
  <div id="screen-loading" class="hidden">
    <div class="spinner"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="hidden">
    <div class="card">
      <div class="status-row">
        <div class="status-dot status-ready" id="statusDot"></div>
        <div class="status-text" id="statusText">—</div>
      </div>

      <div class="field-grid">
        <div class="field"><div class="k">Warehouse</div><div class="v mono" id="fWarehouse">—</div></div>
        <div class="field"><div class="k">Bay Location</div><div class="v mono" id="fBay">—</div></div>
        <div class="field"><div class="k">Qty</div><div class="v" id="fQty">—</div></div>
        <div class="field"><div class="k">Item</div><div class="v mono" id="fItem">—</div></div>
      </div>
      <div class="customer-banner" id="fCustomer">—</div>
      <div style="text-align:center;color:var(--slate-500);font-size:13px;" id="fItemDesc"></div>
    </div>

    <div class="card">
      <button class="big secondary" onclick="loadSuggestions()">Get Bay Suggestions</button>
      <div id="suggestions"></div>
    </div>

    <div class="card">
      <label for="targetBay">Scan To A Bay Location</label>
      <input type="text" id="targetBay" inputmode="text" autocomplete="off" placeholder="Scan or type bay">
      <button class="big primary" onclick="doMove()">Move To Bay</button>
      <div id="move-message"></div>
    </div>

    <div class="card">
      <label>Choose A Bay Location</label>
      <div class="breadcrumb" id="bayBreadcrumb"></div>
      <div id="bayPicker"><div class="group-list" id="groupList"></div></div>
    </div>

    <button class="big secondary" onclick="goHome()">Start Over</button>
  </div>

</main>

<script>
  var currentPallet = null;

  function show(id) {
    ['screen-search', 'screen-loading', 'screen-result'].forEach(function (s) {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
  }

  function goHome() {
    currentPallet = null;
    document.getElementById('palletId').value = '';
    document.getElementById('search-error').innerHTML = '';
    document.getElementById('suggestions').innerHTML = '';
    document.getElementById('move-message').innerHTML = '';
    document.getElementById('targetBay').value = '';
    document.getElementById('groupList').innerHTML = '';
    document.getElementById('bayBreadcrumb').innerHTML = '';
    show('screen-search');
  }

  function doLookup() {
    var id = document.getElementById('palletId').value.trim();
    var errBox = document.getElementById('search-error');
    errBox.innerHTML = '';
    if (!id) {
      errBox.innerHTML = '<div class="banner warn">Enter or scan a Pallet ID first.</div>';
      return;
    }
    show('screen-loading');
    google.script.run
      .withSuccessHandler(function (resp) {
        if (!resp || !resp.result) {
          show('screen-search');
          errBox.innerHTML = '<div class="banner error">No pallet found for "' + id + '".</div>';
          return;
        }
        currentPallet = resp.result;
        renderResult(currentPallet);
        show('screen-result');
      })
      .withFailureHandler(function (err) {
        show('screen-search');
        errBox.innerHTML = '<div class="banner error">Lookup failed: ' + err.message + '</div>';
      })
      .lookupPallet(id);
  }

  function renderResult(p) {
    var ready = (p.status || '').toLowerCase().indexOf('ready') !== -1;
    document.getElementById('statusDot').className = 'status-dot ' + (ready ? 'status-ready' : 'status-unknown');
    document.getElementById('statusText').textContent = (p.lwhId || '') + (p.status ? ' - ' + p.status : '');
    document.getElementById('fWarehouse').textContent = p.location || '—';
    document.getElementById('fBay').textContent = p.bayName || '—';
    document.getElementById('fQty').textContent = p.qty || '—';
    document.getElementById('fItem').textContent = p.item || '—';
    document.getElementById('fCustomer').textContent = p.customer || '—';
    document.getElementById('fItemDesc').textContent = p.itemDesc || '';
  }

  function loadSuggestions() {
    if (!currentPallet) return;
    var box = document.getElementById('suggestions');
    box.innerHTML = '<div class="spinner" style="margin:14px auto;"></div>';
    google.script.run
      .withSuccessHandler(function (resp) {
        var list = (resp && resp.result) || [];
        if (!list.length) {
          box.innerHTML = '<div class="banner warn">No suggestions found for this customer/warehouse yet.</div>';
          return;
        }
        box.innerHTML = list.map(function (s) {
          return '<span class="suggestion-chip" onclick="useSuggestedBay(\'' + s.bayName + '\')">' +
                 s.bayName + ' <span class="chip-count">(' + s.count + ')</span></span>';
        }).join('');
      })
      .withFailureHandler(function (err) {
        box.innerHTML = '<div class="banner error">Could not load suggestions: ' + err.message + '</div>';
      })
      .getBaySuggestions(currentPallet.lwhId);
  }

  function useSuggestedBay(bayName) {
    document.getElementById('targetBay').value = bayName;
  }

  function doMove() {
    var target = document.getElementById('targetBay').value.trim();
    var msgBox = document.getElementById('move-message');
    msgBox.innerHTML = '';
    if (!currentPallet) return;
    if (!target) {
      msgBox.innerHTML = '<div class="banner warn">Scan or choose a target bay first.</div>';
      return;
    }
    google.script.run
      .withSuccessHandler(function () {
        msgBox.innerHTML = '<div class="banner warn">Move completed.</div>';
      })
      .withFailureHandler(function (err) {
        msgBox.innerHTML = '<div class="banner error">' + err.message + '</div>';
      })
      .moveToBay(currentPallet.lwhId, target);
  }

  // ── Bay picker drill-down ──────────────────────────────────────────

  function loadBayGroups() {
    if (!currentPallet || !currentPallet.location) return;
    var list = document.getElementById('groupList');
    list.innerHTML = '<div class="spinner" style="margin:14px auto;"></div>';
    document.getElementById('bayBreadcrumb').textContent = currentPallet.location;
    google.script.run
      .withSuccessHandler(function (resp) {
        var groups = (resp && resp.result) || [];
        list.innerHTML = groups.map(function (g) {
          return '<button class="group-btn" onclick="loadBaysInGroup(\'' + g + '\')">' + g + '</button>';
        }).join('');
      })
      .withFailureHandler(function (err) {
        list.innerHTML = '<div class="banner error">' + err.message + '</div>';
      })
      .getBayGroups(currentPallet.location);
  }

  function loadBaysInGroup(group) {
    var list = document.getElementById('groupList');
    list.className = 'bay-list';
    list.innerHTML = '<div class="spinner" style="margin:14px auto;"></div>';
    document.getElementById('bayBreadcrumb').innerHTML =
      '<button onclick="loadBayGroups(); document.getElementById(\'groupList\').className=\'group-list\';">' +
      currentPallet.location + '</button> / ' + group;

    google.script.run
      .withSuccessHandler(function (resp) {
        var bays = (resp && resp.result) || [];
        if (!bays.length) {
          list.innerHTML = '<div class="banner warn">No bays found in ' + group + '.</div>';
          return;
        }
        list.innerHTML = bays.map(function (b) {
          return '<button class="bay-btn" onclick="useSuggestedBay(\'' + b.bayName + '\')">' + b.bayName + '</button>';
        }).join('');
      })
      .withFailureHandler(function (err) {
        list.innerHTML = '<div class="banner error">' + err.message + '</div>';
      })
      .getBaysInGroup(currentPallet.location, group);
  }

  // Kick off group loading once a pallet is found
  var _origRenderResult = renderResult;
  renderResult = function (p) {
    _origRenderResult(p);
    document.getElementById('groupList').className = 'group-list';
    loadBayGroups();
  };

  // ── Native barcode scanning (BarcodeDetector, with graceful fallback) ──

  function startScan() {
    if (!('BarcodeDetector' in window)) {
      alert('Camera scanning isn\'t supported in this browser. Type the ID instead.');
      return;
    }
    // Camera capture UI is intentionally minimal here — wire up to your
    // existing canvas-based BarcodeDetector flow from the LWH Inventory
    // Portal / Nissan Warehouse Portal for full parity (video preview,
    // torch toggle, etc).
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.onchange = function (e) {
      var file = e.target.files[0];
      if (!file) return;
      var img = new Image();
      img.onload = function () {
        var canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        new BarcodeDetector().detect(canvas).then(function (codes) {
          if (codes.length) {
            document.getElementById('palletId').value = codes[0].rawValue;
          } else {
            alert('No barcode detected — try again or type the ID.');
          }
        });
      };
      img.src = URL.createObjectURL(file);
    };
    input.click();
  }

  document.getElementById('palletId').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doLookup();
  });
  document.getElementById('targetBay').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doMove();
  });
</script>

</body>
</html>
